name = "jjplan"
main = "src/index.ts"
compatibility_date = "2026-05-01"

# Static dashboard SPA, built by `web/` (Next.js, output: 'export') into
# `web/out`. Cloudflare Workers Static Assets serves files from this directory
# directly — when no asset matches (e.g. `/projects`, `/specs/:id`), the
# request falls through to the worker fetch handler defined in `src/index.ts`.
[assets]
directory = "../web/out"

# Cloudflare Access (Google SSO) for the browser dashboard — OPTIONAL.
# Uncomment + fill after configuring Access. When BOTH are set, protected
# routes also accept a valid Access JWT (browser); unset = bearer-only (CLI).
# Neither value is secret (they are identifiers), so plain [vars] is fine.
#   CF_ACCESS_TEAM_DOMAIN = "https://<team>.cloudflareaccess.com"
#   CF_ACCESS_AUD         = "<dashboard app Application Audience (AUD) tag>"
# [vars]
# CF_ACCESS_TEAM_DOMAIN = ""
# CF_ACCESS_AUD = ""

# database_id is filled in during one-time bootstrap:
#   wrangler d1 create jjplan
# Copy the returned id below, commit, then run:
#   wrangler d1 execute jjplan --file migrations/0001_init.sql --remote
[[d1_databases]]
binding = "DB"
database_name = "jjplan"
database_id = "22eed5f7-a156-407d-86d3-3312d8f50f28"
