name = "jjplan"
main = "src/index.ts"
compatibility_date = "2026-05-01"

# Static dashboard SPA, built by `web/` (Next.js, output: 'export') into
# `web/out`. Cloudflare Workers Static Assets serves files from this directory
# directly — when no asset matches (e.g. `/projects`, `/specs/:id`), the
# request falls through to the worker fetch handler defined in `src/index.ts`.
[assets]
directory = "../web/out"

# Cloudflare Access (Google SSO) for the browser dashboard. When BOTH are set,
# protected routes also accept a valid Access JWT (browser); unset = bearer-only.
# Neither value is a secret (team domain is public, AUD is an app-audience
# identifier — a request still needs a Cloudflare-signed JWT for this AUD, which
# requires passing the Access policy), so plain committed [vars] is the standard
# pattern (mirrors Cloudflare's own Workers+Access examples).
[vars]
CF_ACCESS_TEAM_DOMAIN = "https://yigegongjiang.cloudflareaccess.com"
CF_ACCESS_AUD = "e255d29d523b8a7785d15a9556b1e50b3497c691b45887ac0aad2bd27e4e4c6b"

# database_id is filled in during one-time bootstrap:
#   wrangler d1 create jjplan
# Copy the returned id below, commit, then run:
#   wrangler d1 execute jjplan --file migrations/0001_init.sql --remote
[[d1_databases]]
binding = "DB"
database_name = "jjplan"
database_id = "22eed5f7-a156-407d-86d3-3312d8f50f28"
