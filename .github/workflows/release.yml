name: release

# Triggered by pushing a version tag (e.g. v0.1.0). Two independent jobs run
# in parallel: deploy the Worker to Cloudflare, and compile the CLI binaries
# and attach them to the GitHub Release for that tag.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      # Build the dashboard SPA first so wrangler can pick it up via
      # `[assets].directory = "../web/out"` (see worker/wrangler.toml).
      - name: Install web deps
        working-directory: web
        run: bun install --frozen-lockfile || bun install

      - name: Typecheck web
        working-directory: web
        run: bun run typecheck

      - name: Build web (static export to web/out)
        working-directory: web
        run: bun run build

      - name: Install worker deps
        working-directory: worker
        run: bun install --frozen-lockfile || bun install

      # Apply D1 migrations BEFORE deploying the worker so the live runtime
      # never sees a stale schema/data state. wrangler d1 migrations apply is
      # idempotent — already-applied entries in d1_migrations are skipped.
      - name: Apply D1 migrations (remote)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          command: d1 migrations apply jjplan --remote

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          command: deploy

  build-cli:
    # macOS runner cross-compiles both apple-darwin arches from one host (Apple
    # ships both SDKs), so a single job produces arm64 + x64 binaries.
    runs-on: macos-latest
    permissions:
      contents: write  # required by softprops/action-gh-release
    steps:
      - uses: actions/checkout@v4

      - name: Verify VERSION matches tag
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          tag="${GITHUB_REF_NAME#v}"
          if [ "$version" != "$tag" ]; then
            echo "VERSION ($version) != release tag (${GITHUB_REF_NAME})" >&2
            exit 1
          fi

      - name: Add Rust targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Compile macOS binaries (jj-plan + jj-ask × arm64 + x64)
        working-directory: cli
        run: cargo build --release --target aarch64-apple-darwin --target x86_64-apple-darwin

      # Map cargo target triples to the asset names install.sh expects
      # (jj-{plan,ask}-macos-{arm64,x64}).
      - name: Assemble release assets
        working-directory: cli
        run: |
          mkdir -p dist
          for pair in "aarch64-apple-darwin:arm64" "x86_64-apple-darwin:x64"; do
            triple="${pair%%:*}"; arch="${pair##*:}"
            for bin in jj-plan jj-ask; do
              cp "target/$triple/release/$bin" "dist/$bin-macos-$arch"
            done
          done
          ls -la dist

      - name: Generate SHA256 checksums
        working-directory: cli/dist
        run: |
          shopt -s nullglob
          files=( jj-plan-macos-* jj-ask-macos-* )
          [ ${#files[@]} -gt 0 ] || { echo "no build artifacts found in cli/dist" >&2; exit 1; }
          shasum -a 256 "${files[@]}" > checksums.txt
          cat checksums.txt

      - name: Attach binaries to release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            cli/dist/jj-plan-macos-*
            cli/dist/jj-ask-macos-*
            cli/dist/checksums.txt
